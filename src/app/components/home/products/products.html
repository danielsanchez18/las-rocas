<section id="productos" class="flex flex-col gap-y-10">

    <div class="space-y-1">
        <h3 class="text-3xl uppercase font-medium text-black font-title">Nuestras Especialidades</h3>
        <p class="text-gray-700 text-sm">Disfruta de la sazón norteña tradicional elaborada con insumos locales frescos.
        </p>
    </div>


    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5 gap-y-10">

        <!-- Card Product -->
        <a *ngFor="let product of products" class="flex flex-col gap-y-4 group"
            [routerLink]="['/producto', product.id]">
            <div class="overflow-hidden size-full h-60 relative">
                <img [src]="product.image" [alt]="product.name"
                    class="object-cover w-full h-full group-hover:scale-105 transition-transform">

                <div
                    class="flex items-center gap-x-1 bg-white/90 absolute top-2 right-2 rounded-lg text-xs font-semibold text-nowrap px-2 py-1.5">
                    <svg lucideClock class="size-3.5" />
                    <p>{{ product.preparationTime }} m</p>
                </div>
            </div>
            <div class="">
                <h4 class="font-semibold line-clamp-1">{{ product.name }}</h4>
                <p class="text-sm text-gray-700 line-clamp-1">{{ product.description }}</p>

                <div class="flex items-center justify-between mt-3">
                    <div class="flex items-baseline gap-x-2">
                        <p class="font-semibold text-sm leading-none">S/. {{ product.price |
                            number:'1.2-2':'en-US' }}</p>
                        <p class="text-[11px] text-gray-500 line-through leading-none"
                            *ngIf="product.inDiscount && product.finalPrice && product.finalPrice !== product.basePrice">
                            S/. {{ product.basePrice | number:'1.2-2':'en-US' }}
                        </p>
                    </div>
                    <button type="button"
                        (click)="$event.preventDefault(); $event.stopPropagation(); addToCart(product)"
                        class="text-primary hover:underline underline-offset-2 w-fit text-sm font-medium cursor-pointer">
                        Agregar al carrito
                    </button>
                </div>
            </div>
        </a>

    </div>

</section>
