<section id="categories" class="flex flex-col gap-y-10">

    <div class="space-y-1">
        <h3 class="text-3xl uppercase font-medium text-black font-title">Nuestras Categorías</h3>
        <p class="text-gray-700 text-sm">Descubre la variedad y sabor chiclayano que tenemos para ti.</p>
    </div>

    <div class="grid grid-cols-2 gap-x-5 gap-y-10 md:grid-cols-3 lg:grid-cols-6">

        <a *ngFor="let category of categories" [routerLink]="['/menu', category.id]"
            class="flex flex-col items-center gap-y-3 group">
            <div class="overflow-hidden rounded-full size-40">
                <img [src]="category.image" alt="{{ category.name }}"
                    class="object-cover size-full rounded-full group-hover:scale-105 transition-transform">
            </div>
            <div class="flex flex-col items-center">
                <p class="font-semibold line-clamp-1 text-center">{{ category.name }}</p>
                <p class="text-sm text-gray-700 line-clamp-1 text-center">{{ category.description }}</p>
            </div>
        </a>

    </div>

</section>
