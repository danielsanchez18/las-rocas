<!-- Modal Code Login -->

<div
    class="hs-overlay-animation-target hs-overlay-open:scale-100 hs-overlay-open:opacity-100 scale-95 opacity-0 ease-in-out transition-all duration-200 sm:max-w-lg sm:w-full m-3 sm:mx-auto min-h-[calc(100%-56px)] flex items-center">
    <div
        class="w-full flex flex-col gap-y-10 bg-white border border-gray-200 shadow-2xs rounded-2xl pointer-events-auto px-5 py-10">

        <!-- Title -->
        <div class="text-center space-y-5">
            <h2 class="text-xl text-balance font-semibold">Comprueba tu bandeja de entrada</h2>
            <p class="text-sm text-balance text-gray-600">Introduce el código de 6 dígitos que hemos enviado a
                <span class="text-primary font-semibold">{{ email || 'tu correo' }}</span>
                para completar la recuperación.
            </p>
        </div>

        <!-- Input Code -->
        <div class="flex items-center justify-center gap-x-3" data-hs-pin-input="">
            <input type="text" [(ngModel)]="codeArr[0]" (input)="onInput($event, 0)" (keydown)="onKeyDown($event, 0)" maxlength="1"
                class="block w-9.5 sm:w-10 sm:text-lg text-center border-gray-300 rounded-md focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none"
                data-hs-pin-input-item="" autofocus="">
            <input type="text" [(ngModel)]="codeArr[1]" (input)="onInput($event, 1)" (keydown)="onKeyDown($event, 1)" maxlength="1"
                class="block w-9.5 sm:w-10 sm:text-lg text-center border-gray-300 rounded-md focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none"
                data-hs-pin-input-item="">
            <input type="text" [(ngModel)]="codeArr[2]" (input)="onInput($event, 2)" (keydown)="onKeyDown($event, 2)" maxlength="1"
                class="block w-9.5 sm:w-10 sm:text-lg text-center border-gray-300 rounded-md focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none"
                data-hs-pin-input-item="">
            <input type="text" [(ngModel)]="codeArr[3]" (input)="onInput($event, 3)" (keydown)="onKeyDown($event, 3)" maxlength="1"
                class="block w-9.5 sm:w-10 sm:text-lg text-center border-gray-300 rounded-md focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none"
                data-hs-pin-input-item="">
            <input type="text" [(ngModel)]="codeArr[4]" (input)="onInput($event, 4)" (keydown)="onKeyDown($event, 4)" maxlength="1"
                class="block w-9.5 sm:w-10 sm:text-lg text-center border-gray-300 rounded-md focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none"
                data-hs-pin-input-item="">
            <input type="text" [(ngModel)]="codeArr[5]" (input)="onInput($event, 5)" (keydown)="onKeyDown($event, 5)" maxlength="1"
                class="block w-9.5 sm:w-10 sm:text-lg text-center border-gray-300 rounded-md focus:border-primary focus:ring-primary disabled:opacity-50 disabled:pointer-events-none"
                data-hs-pin-input-item="">
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage">
            <p class="text-center text-sm text-red-600">{{ errorMessage }}</p>
        </div>

        <!-- Buttons -->
        <div class="grid sm:grid-cols-2 gap-y-3 gap-x-3">
            <button type="button" (click)="resendCode()" class="font-medium border border-gray-300 text-sm rounded-full px-4 py-2.5 w-full hover:bg-gray-50">
                Reenviar código
            </button>
            <button type="button" (click)="verifyCode()" [disabled]="isLoading" class="font-medium bg-primary text-white text-sm rounded-full px-4 py-2.5 w-full hover:bg-primary-hover disabled:opacity-50">
                {{ isLoading ? 'Verificando...' : 'Verificar' }}
            </button>
            <button
                class="font-medium sm:col-span-2 mt-4 text-sm text-gray-600 hover:underline hover:text-black mx-auto"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-scale-animation-modal"
                data-hs-overlay="#hs-scale-animation-modal">
                Iniciar sesión en una cuenta diferente
            </button>
        </div>
    </div>
</div>
<!-- End Modal Code Login -->
