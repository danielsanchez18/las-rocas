<div
    class="hs-overlay-animation-target hs-overlay-open:scale-100 hs-overlay-open:opacity-100 scale-95 opacity-0 ease-in-out transition-all duration-200 sm:max-w-md sm:w-full m-3 sm:mx-auto min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full flex flex-col bg-white rounded-2xl overflow-hidden pointer-events-auto">

        <!-- Head -->
        <div class="flex gap-x-3 px-5 py-4 border-b border-gray-200">

            <img src="/logo.svg" alt="" class="size-9">

            <div class="flex flex-col">
                <h1 class="text-sm font-medium">{{ review ? 'Tu reseña' : 'Califica tu experiencia' }}</h1>
                <p class="text-sm text-gray-500">{{ review ? 'Ya calificaste este pedido' : 'Ayúdanos con tu calificación' }}</p>
            </div>

            <button id="close-review-modal" (click)="closeModal()" class="mt-1 h-fit text-gray-500 hover:text-black ml-auto" aria-haspopup="dialog"
                aria-expanded="false" aria-controls="hs-review-modal" data-hs-overlay="#hs-review-modal">
                <svg lucideX class="size-5" />
            </button>
        </div>

        <!-- Content -->
        <div class="p-5 flex flex-col gap-y-5">

            <!-- Stars -->
            <div class="flex flex-col gap-y-2">
                <label for="" class="text-sm font-medium">Tu calificación</label>

                <div class="grid grid-cols-5 gap-x-1">
                    <button *ngFor="let star of [1, 2, 3, 4, 5]" 
                        (click)="setRating(star)"
                        [disabled]="review !== null"
                        [ngClass]="{'cursor-default': review !== null}"
                        class="rounded-lg border border-gray-200 p-3 flex items-center justify-center group transition-colors">
                        <svg lucideStar
                            class="size-6 stroke-[1.5] transition-colors" 
                            [ngClass]="(review ? review.rating >= star : rating >= star) ? 'fill-yellow-400 stroke-yellow-400' : 'text-gray-500 ' + (!review ? 'group-hover:fill-yellow-400 group-hover:stroke-yellow-400' : '')" />
                    </button>
                </div>
            </div>

            <!-- Comment -->
            <div class="flex flex-col gap-y-2">
                <label for="" class="text-sm font-medium">Tu opinión</label>

                <textarea *ngIf="review" rows="4" 
                    [ngModel]="review.comment"
                    disabled
                    placeholder="Sin comentario"
                    class="rounded-lg text-sm border border-gray-200 px-4 py-2 outline-none focus:border-primary resize-none disabled:bg-gray-100 disabled:text-gray-600"></textarea>

                <textarea *ngIf="!review" rows="4" 
                    [(ngModel)]="comment"
                    placeholder="Comparte tu experiencia con nosotros"
                    class="rounded-lg text-sm border border-gray-200 px-4 py-2 outline-none focus:border-primary resize-none"></textarea>
            </div>

        </div>

        <!-- Footer -->
        <div class="px-5 py-4 border border-t border-gray-200 flex gap-x-2" *ngIf="!review">
            <button
                (click)="closeModal()"
                data-hs-overlay="#hs-review-modal"
                class="w-full border border-gray-200 rounded-lg text-sm font-medium px-4 py-2 hover:bg-gray-100 transition-colors">
                Cancelar
            </button>

            <button
                (click)="submitReview()"
                [disabled]="isSubmitting"
                class="w-full bg-primary text-white rounded-lg text-sm font-medium px-4 py-2 hover:bg-primary-hover transition-colors disabled:opacity-50">
                {{ isSubmitting ? 'Enviando...' : 'Enviar reseña' }}
            </button>
        </div>

        <div class="px-5 py-4 border border-t border-gray-200 flex gap-x-2" *ngIf="review">
            <button
                data-hs-overlay="#hs-review-modal"
                class="w-full bg-primary text-white rounded-lg text-sm font-medium px-4 py-2 hover:bg-primary-hover transition-colors">
                Cerrar
            </button>
        </div>

    </div>
</div>
