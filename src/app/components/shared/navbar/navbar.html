<header class="w-full">

    <div class="flex items-center gap-x-10 px-4 md:px-7 lg:px-10 py-3 w-full max-w-350 mx-auto">

        <div class="flex gap-x-3 sm:gap-x-5">
            <!-- Button Open Menú -->
            <button class="md:hidden text-black hover:text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-text-align-start-icon lucide-text-align-start size-5.5">
                    <path d="M21 5H3" />
                    <path d="M15 12H3" />
                    <path d="M17 19H3" />
                </svg>
            </button>

            <!-- Logo -->
            <a [routerLink]="['/']" class="h-10 w-auto flex cursor-pointer">
                <img src="/logo.svg" alt="Logo Las Rocas" class="h-full object-cover">
            </a>
        </div>

        <!-- Enlaces de navegación -->
        <nav class="hidden md:flex items-center gap-x-5">
            <a routerLink="/" routerLinkActive="text-primary font-semibold underline"
                [routerLinkActiveOptions]="{exact: true}"
                class="hover:text-primary transition uppercase text-sm hover:underline">
                Inicio
            </a>
            <a routerLink="/menu" routerLinkActive="text-primary font-semibold underline"
                class="hover:text-primary transition uppercase text-sm hover:underline">
                Menú
            </a>
            <a routerLink="/nosotros" routerLinkActive="text-primary font-semibold underline"
                class="hover:text-primary transition uppercase text-sm hover:underline">
                Nosotros
            </a>
            <a routerLink="/reservas" routerLinkActive="text-primary font-semibold underline"
                class="hover:text-primary transition uppercase text-sm hover:underline">
                Reservas
            </a>
            <a routerLink="/contacto" routerLinkActive="text-primary font-semibold underline"
                class="hover:text-primary transition uppercase text-sm hover:underline">
                Contacto
            </a>
        </nav>

        <!-- Botones de buscar, carrito y login -->
        <div class="ml-auto flex items-center gap-x-4">

            <button type="button" class="cursor-pointer text-black hover:text-primary transition" aria-haspopup="dialog"
                aria-expanded="false" aria-controls="hs-overlay-search" data-hs-overlay="#hs-overlay-search">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-search size-5.5">
                    <path d="m21 21-4.34-4.34" />
                    <circle cx="11" cy="11" r="8" />
                </svg>
            </button>

            <!-- Botón de Carrito con cantidad badge -->
            <button aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-offcanvas-example"
                data-hs-overlay="#hs-offcanvas-example"
                class="relative cursor-pointer text-black hover:text-primary transition p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" class="size-5.5">
                    <path fill="currentColor" d="M15 11a1 1 0 1 0 0-2a1 1 0 0 0 0 2m-5-1a1 1 0 1 1-2 0a1 1 0 0 1 2 0" />
                    <path fill="currentColor" fill-rule="evenodd"
                        d="M8.25 5.276V5a3.75 3.75 0 1 1 7.5 0v.276c.658.02 1.245.057 1.765.122c1.201.152 2.174.47 2.925 1.204q.376.368.664.81c.572.88.694 1.896.607 3.104c-.086 1.182-.382 2.666-.759 4.549l-.02.095c-.26 1.307-.468 2.347-.726 3.166c-.265.842-.604 1.524-1.17 2.076q-.293.285-.63.516c-.652.447-1.387.645-2.265.74c-.853.092-1.913.092-3.246.092h-1.79c-1.333 0-2.393 0-3.246-.092c-.878-.095-1.613-.293-2.265-.74a5 5 0 0 1-.63-.516c-.566-.552-.905-1.234-1.17-2.076c-.257-.819-.465-1.859-.727-3.166l-.019-.095c-.376-1.883-.673-3.367-.758-4.549c-.088-1.208.034-2.224.606-3.104a4.8 4.8 0 0 1 .664-.81c.752-.734 1.724-1.052 2.925-1.204c.52-.065 1.107-.102 1.765-.122M9.75 5a2.25 2.25 0 0 1 4.5 0v.252q-.636-.002-1.344-.002h-1.811q-.709 0-1.345.002zM4.608 7.675c.415-.405 1.008-.655 2.065-.789c1.07-.135 2.49-.136 4.476-.136h1.703c1.986 0 3.404.001 4.475.136c1.057.134 1.65.384 2.065.789q.257.252.454.554c.316.486.445 1.117.369 2.18c-.078 1.076-.355 2.467-.744 4.415c-.272 1.359-.465 2.32-.696 3.051c-.225.717-.465 1.14-.786 1.453a3.3 3.3 0 0 1-.43.353c-.37.253-.832.405-1.579.486c-.763.082-1.743.083-3.129.083H11.15c-1.386 0-2.366-.001-3.13-.083c-.746-.08-1.207-.233-1.577-.486a3.3 3.3 0 0 1-.431-.354c-.321-.312-.56-.735-.786-1.452c-.23-.732-.424-1.692-.695-3.051c-.39-1.948-.667-3.34-.744-4.416c-.077-1.062.052-1.693.368-2.179a3.3 3.3 0 0 1 .454-.554"
                        clip-rule="evenodd" />
                </svg>
                <span *ngIf="cartCount > 0"
                    class="absolute -top-1 -right-2 bg-primary text-white text-xs font-semibold rounded-full size-5 flex items-center justify-center">
                    {{ cartCount }}
                </span>
            </button>

            <ng-container *ngIf="authService.currentUser(); else showLogin">
                <!-- Boton de Notificaciones -->
                <button class="text-black hover:text-primary transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"
                        class="size-5 stroke-2">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <path fill="currentColor" fill-rule="evenodd"
                            d="M12 1.25A7.75 7.75 0 0 0 4.25 9v.704a3.53 3.53 0 0 1-.593 1.958L2.51 13.385c-1.334 2-.316 4.718 2.003 5.35q1.133.309 2.284.523l.002.005C7.567 21.315 9.622 22.75 12 22.75s4.433-1.435 5.202-3.487l.002-.005a29 29 0 0 0 2.284-.523c2.319-.632 3.337-3.35 2.003-5.35l-1.148-1.723a3.53 3.53 0 0 1-.593-1.958V9A7.75 7.75 0 0 0 12 1.25m3.376 18.287a28.5 28.5 0 0 1-6.753 0c.711 1.021 1.948 1.713 3.377 1.713s2.665-.692 3.376-1.713M5.75 9a6.25 6.25 0 1 1 12.5 0v.704c0 .993.294 1.964.845 2.79l1.148 1.723a2.02 2.02 0 0 1-1.15 3.071a26.96 26.96 0 0 1-14.187 0a2.02 2.02 0 0 1-1.15-3.07l1.15-1.724a5.03 5.03 0 0 0 .844-2.79z"
                            clip-rule="evenodd" />
                    </svg>
                </button>

                <!-- Botón de Perfil -->
                <button routerLink="/perfil"
                    class="flex flex-col gap-y-1 bg-gray-100 text-black hover:bg-gray-200 hover:text-primary h-10 w-10 rounded-full items-center justify-center transition">

                    <!-- Si tiene imagen -->
                    @if (user?.photoUrl) {
                    <img [src]="user?.photoUrl" alt="Foto de perfil" class="w-10 h-10 rounded-full">
                    }
                    @else {
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" class="size-5.5">
                        <g fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="6" r="4" />
                            <path d="M20 17.5c0 2.485 0 4.5-8 4.5s-8-2.015-8-4.5S7.582 13 12 13s8 2.015 8 4.5Z" />
                        </g>
                    </svg>
                    }
                </button>

            </ng-container>

            <ng-template #showLogin>
                <!-- Boton de Ingresar -->
                <a href="/auth/ingresar" class="cursor-pointer text-black hover:text-primary transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="size-6">
                        <path d="M0 0h24v24H0z" fill="none" />
                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="1.5">
                            <path
                                d="M8 8c0-.575 0-.822.045-1.075A2.98 2.98 0 0 1 9.833 4.7c.24-.1.523-.165 1.09-.294l2.728-.623c3.39-.774 5.084-1.161 6.217-.27C21 4.405 21 6.126 21 9.568v4.864c0 3.442 0 5.164-1.132 6.055c-1.133.891-2.827.504-6.217-.27l-2.728-.623c-.567-.13-.85-.194-1.09-.294a2.98 2.98 0 0 1-1.788-2.225C8 16.822 8 16.575 8 16" />
                            <path d="M13 9s3 2.21 3 3s-3 3-3 3m2.5-3H3" />
                        </g>
                    </svg>
                </a>
            </ng-template>
        </div>

    </div>

</header>
