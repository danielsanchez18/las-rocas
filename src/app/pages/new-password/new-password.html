<main class="h-dvh w-full flex items-center ">

    <div class="w-full max-w-sm mx-auto space-y-7">

        <!-- Usuario -->
        <div class="space-y-3">
            <div class="flex items-center justify-center mx-auto h-24 w-24 rounded-full bg-primary text-white text-3xl font-semibold">
                {{ email?.charAt(0)?.toUpperCase() || 'U' }}
            </div>
            <p class="text-center text-lg font-medium">{{ email || 'Usuario' }}</p>
        </div>

        <!-- Formulario de creación de cuenta -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">

            <!-- Correo electrónico -->
            <div class="flex flex-col gap-y-2">
                <label for="password" class="block text-sm font-medium">
                    Nueva contraseña
                </label>
                <input type="password" id="password" formControlName="password"
                    placeholder="Ingresa tu nueva contraseña"
                    class="w-full px-4 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
            </div>

            <!-- Correo electrónico -->
            <div class="flex flex-col gap-y-2">
                <label for="confirm-password" class="block text-sm font-medium">
                    Confirmar contraseña
                </label>
                <input type="password" id="confirm-password" formControlName="confirmPassword"
                    placeholder="Confirma tu contraseña"
                    class="w-full px-4 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
            </div>

            <p *ngIf="errorMessage" class="text-sm text-red-600 mt-1 text-center">{{ errorMessage }}</p>

            <!-- Botón de creación de cuenta -->
            <button type="submit"
                [disabled]="form.invalid || isLoading"
                class="mt-2 w-full py-2.5 text-center bg-primary text-white text-sm font-medium hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-primary-hover disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                {{ isLoading ? 'Restableciendo...' : 'Restablecer contraseña' }}
            </button>
        </form>

    </div>
</main>
