<main class="h-dvh w-full flex items-center justify-center">

    <div class="w-full max-w-sm mx-auto space-y-7">

        <!-- Logo -->
        <a href="/" class="flex justify-center w-fit mx-auto">
            <img src="/logo.svg" alt="Las Rocas Logo" class="h-24">
        </a>

        <!-- Título -->
        <div>
            <h1 class="text-2xl font-medium text-center uppercase tracking-wide font-title">Iniciar sesión</h1>
            <p class="mt-1 text-center text-gray-700 text-sm">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <!-- Formulario de inicio de sesión -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">

            <!-- Correo electrónico -->
            <div class="flex flex-col gap-y-2">
                <label for="email" class="block text-sm font-medium">
                    Correo electrónico
                </label>
                <div class="relative">
                    <input type="email" id="email" formControlName="email" placeholder="Ingresa tu correo electrónico"
                        class="w-full px-4 pl-12 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    <svg lucideAtSign class="absolute text-gray-500 size-4 top-1/2 -translate-y-1/2 left-4" />
                </div>
            </div>

            <!-- Contraseña -->
            <div class="flex flex-col gap-y-2">
                <label for="password" class="block text-sm font-medium">
                    Contraseña
                </label>
                <div class="relative">
                    <input type="password" id="password" formControlName="password" placeholder="Ingresa tu contraseña"
                        class="w-full px-4 pl-12 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    <svg lucideLock class="absolute text-gray-500 size-4 top-1/2 -translate-y-1/2 left-4" />
                </div>
            </div>

            <!-- Olvidé mi contraseña -->
            <div class="text-right">
                <a href="/auth/recuperar-clave" class="text-sm text-primary font-semibold hover:underline">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <!-- Botón de inicio de sesión -->
            <button type="submit" [disabled]="loginForm.invalid"
                class="w-full py-2.5 text-center bg-primary text-white text-sm font-medium hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-primary-hover disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                Iniciar Sesión
            </button>
        </form>

        <!-- Signup -->
        <div class="flex gap-x-2 items-center text-sm justify-center mt-5">
            <p class="text-center">
                ¿Eres nuevo?
            </p>
            <a href="/auth/registrarse" class="text-primary font-semibold hover:underline">Crea una cuenta</a>
        </div>

    </div>

</main>
