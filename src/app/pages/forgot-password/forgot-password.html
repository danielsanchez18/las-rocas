<main class="h-dvh w-full flex items-center ">

    <div class="w-full max-w-sm mx-auto space-y-7">

        <!-- Logo -->
        <a href="/" class="flex justify-center w-fit mx-auto">
            <img src="/logo.svg" alt="Logo Las Rocas" class="h-24">
        </a>

        <!-- Título -->
        <div class="space-y-3">
            <h1 class="text-2xl font-medium text-center uppercase tracking-wide font-title">Recuperar Contraseña</h1>
            <p class="text-center text-gray-700 text-sm">Te enviaremos un código para que restablezcas tu contraseña.
            </p>
        </div>

        <!-- Formulario de creación de cuenta -->
        <form class="flex flex-col space-y-4">

            <!-- Correo electrónico -->
            <div class="flex flex-col gap-y-2">
                <label for="email" class="block text-sm font-medium">
                    Correo electrónico
                </label>
                <div class="relative">
                    <input type="email" id="email" formControlName="email" placeholder="Ingresa tu correo electrónico"
                        class="w-full px-4 pl-12 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    <svg lucideAtSign class="absolute text-gray-500 size-4 top-1/2 -translate-y-1/2 left-4" />
                </div>
            </div>

            <!-- Botón de creación de cuenta -->
            <button type="button"
                class="mt-2 w-full py-2.5 text-center bg-primary text-white text-sm font-medium hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-primary-hover disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-scale-animation-modal"
                data-hs-overlay="#hs-scale-animation-modal">
                Enviar código
            </button>
        </form>

        <!-- Login -->
        <div class="flex gap-x-2 items-center text-sm justify-center mt-5">
            <p class="text-center">
                ¿No olvidaste tu contraseña?
            </p>
            <a href="/auth/ingresar" class="text-primary font-semibold hover:underline">Inicia sesión</a>
        </div>

    </div>
</main>

<div id="hs-scale-animation-modal"
    class="hs-overlay [--overlay-backdrop:static] hidden size-full fixed top-0 inset-s-0 z-80 overflow-x-hidden overflow-y-auto pointer-events-none"
    role="dialog" tabindex="-1" aria-labelledby="hs-scale-animation-modal-label">
    <component-forgot-password-code />
</div>
