<div class="flex flex-col gap-y-5">

    <div class="flex items-center justify-between">
        <h1 class="text-lg font-title uppercase">Mis pedidos</h1>

        <div class="flex items-center gap-x-1" *ngIf="totalElements > 0">
            <p class="text-sm">
                <span class="font-medium">{{ totalElements }} pedidos</span>
                en total
            </p>
            <!-- 
            <button
                class="px-2 py-1 flex items-center text-gray-700 hover:text-black gap-x-1 text-sm hover:bg-gray-100">
                Mayo 2024
                <svg lucideChevronDown class="size-4" />
            </button>
            -->
        </div>
    </div>

    <div class="flex gap-x-2 border-b border-gray-300 w-full">

        <div class="py-2 border-b-2" [ngClass]="currentTab === 'all' ? 'border-black' : 'border-transparent'">
            <button (click)="changeTab('all')" class="text-sm px-2 py-1" [ngClass]="currentTab === 'all' ? 'text-black' : 'text-gray-500 hover:text-black hover:bg-gray-100'">
                Todos
            </button>
        </div>

        <div class="py-2 border-b-2" [ngClass]="currentTab === 'pending' ? 'border-black' : 'border-transparent'">
            <button (click)="changeTab('pending')" class="text-sm px-2 py-1" [ngClass]="currentTab === 'pending' ? 'text-black' : 'text-gray-500 hover:text-black hover:bg-gray-100'">
                Pendientes
            </button>
        </div>

        <div class="py-2 border-b-2" [ngClass]="currentTab === 'closed' ? 'border-black' : 'border-transparent'">
            <button (click)="changeTab('closed')" class="text-sm px-2 py-1" [ngClass]="currentTab === 'closed' ? 'text-black' : 'text-gray-500 hover:text-black hover:bg-gray-100'">
                Cerrados
            </button>
        </div>

    </div>

    <ng-container *ngIf="orders.length > 0; else noOrders">
        <div class="flex flex-col gap-y-5">
            <component-order-table *ngFor="let order of orders" [order]="order" />
        </div>
    </ng-container>

    <ng-template #noOrders>
        <div class="py-10 text-center text-gray-500 text-sm">
            No se encontraron pedidos
        </div>
    </ng-template>

    <component-shared-paginator 
        *ngIf="totalPages > 1"
        [page]="page" 
        [totalPages]="totalPages" 
        [totalElements]="totalElements"
        (pageChange)="onPageChange($event)">
    </component-shared-paginator>

</div>
