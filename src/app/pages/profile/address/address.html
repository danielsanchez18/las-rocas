<ng-container *ngIf="user">
    <div class="space-y-5">

        <h1 class="text-lg font-title uppercase">Mis direcciones</h1>

        <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-5">

            <!-- Casa (Solo visible si tiene dirección) -->
            <div *ngIf="user.address" class="rounded-xl bg-gray-100 p-1 h-full flex flex-col">
                <div class="bg-white rounded-lg p-5 h-full">

                    <div class="flex items-center gap-x-2 ">
                        <p class="font-medium">Casa</p>
                        <p
                            class="bg-primary font-semibold text-white px-2 py-2 leading-none rounded-md text-xs ml-auto">
                            Principal</p>
                    </div>

                    <div class="mt-3">
                        <p class="text-sm text-gray-700 whitespace-pre-wrap">{{ user.address }}</p>
                        <p class="text-sm text-gray-700 whitespace-pre-wrap">Monsefú, Chiclayo</p>
                    </div>
                </div>
                <div class="px-3 py-3 flex items-center justify-center">
                    <button (click)="openModal()"
                        class="hover:text-primary text-xs underline font-medium underline-offset-2 px-2">Editar</button>
                </div>
            </div>

            <!-- Nueva dirección (Solo visible si NO tiene dirección) -->
            <button *ngIf="!user.address" (click)="openModal()"
                class="flex flex-col items-center justify-center gap-y-2 border border-dashed border-gray-400 rounded-xl p-10 h-full text-gray-500 hover:border-primary group">

                <svg lucidePlus class="size-7" />
                <p class="text-sm group-hover:text-primary group-hover:underline">Nueva dirección</p>

            </button>

        </div>

    </div>

    <!-- Custom Modal Overlay -->
    <div *ngIf="isModalOpen"
        class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 overflow-y-auto overflow-x-hidden p-4">

        <div
            class="bg-white w-full max-w-md rounded-2xl shadow-lg flex flex-col transform transition-all duration-300 scale-100 opacity-100">

            <!-- Header -->
            <div class="flex justify-between items-center px-5 py-4 border-b border-gray-200">
                <div>
                    <h3 class="font-medium text-gray-800">{{ user.address ? 'Editar' : 'Añadir' }} Dirección</h3>
                    <p class="text-sm text-gray-500">Ingresa la nueva dirección completa.</p>
                </div>
                <button (click)="closeModal()" class="text-gray-400 hover:text-gray-700">
                    <svg lucideX class="size-5" />
                </button>
            </div>

            <!-- Body -->
            <div class="p-5">
                <div class="flex flex-col gap-y-2">
                    <label class="text-sm font-medium">Dirección</label>
                    <textarea rows="3" [(ngModel)]="editAddressValue" placeholder="Ej. Calle Los Pinos 123, Chiclayo"
                        class="rounded-lg text-sm border border-gray-200 px-4 py-2 outline-none focus:border-primary resize-none"></textarea>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-5 py-4 border-t border-gray-200 flex justify-end gap-x-2">
                <button (click)="closeModal()"
                    class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-100">
                    Cancelar
                </button>
                <button (click)="saveAddress()" [disabled]="isSaving || !editAddressValue.trim()"
                    class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary-hover disabled:opacity-50">
                    {{ isSaving ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>

        </div>
    </div>
</ng-container>
